<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DHIC Portal — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      width: 72px;
      height: 72px;
      background: #d1fae5;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 36px; height: 36px; color: #008f6c; }
    h1 { font-size: 22px; font-weight: 900; margin-bottom: 10px; color: #0f172a; }
    p { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 28px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fef3c7;
      color: #92400e;
      border-radius: 9999px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 32px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #008f6c;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #00705a; }
    .cached {
      margin-top: 20px;
      font-size: 12px;
      color: #94a3b8;
    }
    .cached a { color: #008f6c; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M15.536 8.464a5 5 0 010 7.072M6.343 17.657a9 9 0 010-12.728M8.464 15.536a5 5 0 010-7.072M12 12h.01" />
      </svg>
    </div>

    <div class="pill">
      ⚡ Offline Mode
    </div>

    <h1>No Internet Connection</h1>
    <p>
      DHIC Portal is offline. Your recently viewed pages are still available.
      Reconnect to access live data.
    </p>

    <button class="btn" onclick="tryReload()">Try Again</button>

    <p class="cached">
      Cached pages: <a href="/tasks">Tasks</a> · <a href="/announcements">Notices</a> · <a href="/attendance">Attendance</a>
    </p>
  </div>

  <script>
    function tryReload() {
      window.location.reload();
    }
    // Auto-retry when connection restores
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
